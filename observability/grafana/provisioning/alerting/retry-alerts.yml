apiVersion: 1

groups:
  - orgId: 1
    name: notifyservice-retry-alerts
    folder: NotifyService Alerts
    interval: 1m
    rules:
      - uid: notifyservice-high-dlq
        title: HighDeadLetterQueue
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: rabbitmq_queue_messages{queue=~"dlq.*"} > 10
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Dead Letter Queue {{ $labels.queue }} has {{ $values.A.Value }} messages"
          description: "Messages are failing permanently for queue {{ $labels.queue }}. Check adapter health and worker retry flow."
        labels:
          severity: warning
          service: workers

      - uid: notifyservice-high-retry-rate
        title: HighRetryRate
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum by (adapter) (rate(notify_retry_attempts_total{status="scheduled"}[5m])) > 1 or sum by (adapter) (rate(notify_retry_attempts{status="scheduled"}[5m])) > 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "Elevated retry rate for adapter {{ $labels.adapter }}"
          description: "Retry scheduling rate is above threshold for adapter {{ $labels.adapter }}. Investigate downstream instability."
        labels:
          severity: warning
          service: workers
