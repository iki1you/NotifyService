services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: notifyservice_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NotifyService_Dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notifyservice_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: notifyservice_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notifyservice_network

  # API Service
  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: notifyservice_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NotifyService_Dev;Username=postgres;Password=postgres"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__RequestedHeartbeat: 60
      RabbitMQ__NetworkRecoveryInterval: 10
      RabbitMQ__AutomaticRecoveryEnabled: true
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notifyservice_network
    restart: on-failure

  # Workers Service
  workers:
    build:
      context: .
      dockerfile: Workers/Dockerfile
    container_name: notifyservice_workers
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NotifyService_Dev;Username=postgres;Password=postgres"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__RequestedHeartbeat: 60
      RabbitMQ__NetworkRecoveryInterval: 10
      RabbitMQ__AutomaticRecoveryEnabled: true
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notifyservice_network
    restart: on-failure

  # Admin Panel
  adminpanel:
    build:
      context: .
      dockerfile: AdminPanel/Dockerfile
    container_name: notifyservice_adminpanel
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=NotifyService_Dev;Username=postgres;Password=postgres"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - notifyservice_network
    restart: on-failure

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  notifyservice_network:
    driver: bridge

